<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dia 27 🎬</title>

<style>
body{
  margin:0;
  height:100vh;
  display:grid;
  place-items:center;
  background:#000;
  color:white;
  font-family:system-ui,Arial;
  text-align:center;
  overflow:hidden;
}

/* CARD */
.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  padding:22px;
  border-radius:20px;
  width:min(720px,92vw);
  backdrop-filter:blur(10px);
}

/* MASCARA */
.mask{
  width:220px;
  margin:auto;
  animation:float 4s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* TEXTO */
h1{margin:10px 0 6px}
.sub{opacity:.85;margin-bottom:14px}

/* BOTÕES */
.cta{
  position:relative;
  display:flex;
  justify-content:center;
  gap:12px;
  padding:20px;
}

button{
  padding:12px 18px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:15px;
  cursor:pointer;
}

#yes{
  background:linear-gradient(135deg,#ff2e6a,#ff2e6a80);
}

#no{
  position:relative;
}

/* mensagem */
.msg{
  margin-top:12px;
  min-height:20px;
  opacity:.85;
}

/* botão som */
#soundBtn{
  margin-top:12px;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:white;
}
</style>
</head>

<body>

<div class="card">

<div class="mask">
<!-- máscara estilo ghostface -->
<svg viewBox="0 0 200 240">
<ellipse cx="100" cy="120" rx="70" ry="95" fill="#fff"/>
<ellipse cx="70" cy="100" rx="18" ry="24" fill="#000"/>
<ellipse cx="130" cy="100" rx="18" ry="24" fill="#000"/>
<ellipse cx="100" cy="150" rx="12" ry="10" fill="#000"/>
<ellipse cx="100" cy="185" rx="20" ry="30" fill="#000"/>
</svg>
</div>

<h1>Então… sobre o dia 27 🎬</h1>

<div class="sub">
Só queria confirmar se está tudo certo até lá 🙂<br>
Eu vou comprar os ingressos e já garantir o combo 🍿
</div>

<div class="cta" id="cta">
<button id="yes">✅ Tá tudo certo</button>
<button id="no">❌ Ainda não</button>
</div>

<div class="msg" id="msg">
(hmm… tenta clicar no “ainda não” 😈)
</div>

<button id="soundBtn">🔊 Ativar som</button>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");
const msg=document.getElementById("msg");
const cta=document.getElementById("cta");

const music=document.getElementById("music");
const soundBtn=document.getElementById("soundBtn");

async function enableSound(){
 try{
   await music.play();
   soundBtn.textContent="🔊 Som ativado";
 }catch{}
}

soundBtn.onclick=enableSound;
document.addEventListener("click",enableSound,{passive:true});
document.addEventListener("touchstart",enableSound,{passive:true});

/* botão NÃO foge */
function dodge(){
 const box=cta.getBoundingClientRect();
 const btn=noBtn.getBoundingClientRect();

 const x=Math.random()*(box.width-btn.width);
 const y=Math.random()*40;

 noBtn.style.transform=`translate(${x}px,${y}px)`;
 msg.textContent="acho que esse não não quer ser escolhido 😅";
}

noBtn.addEventListener("mouseenter",dodge);
noBtn.addEventListener("touchstart",(e)=>{
 e.preventDefault();
 dodge();
},{passive:false});

noBtn.addEventListener("click",(e)=>{
 e.preventDefault();
 dodge();
});

yesBtn.onclick=()=>{
 msg.textContent="Perfeito 😄 então dia 27 é seen!";
 enableSound();
};
</script>

</body>
</html>
